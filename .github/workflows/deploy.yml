name: Deploy Next.js

# Запускаем workflow при пуше в main
on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Принудительно Node 24

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Шаги workflow
    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Логинимся в GitHub Container Registry
      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u USERNAME --password-stdin

      # 3. Build Docker образ
      - name: Build Docker image
        run: docker build -t ghcr.io/vlad-vishnevskii/next:latest .

      # 4. Push Docker образ
      - name: Push Docker image
        run: docker push ghcr.io/USERNAME/next:latest

      # 5. Подключаемся к серверу и деплоим
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22 # если у тебя нестандартный порт, меняешь
          script: |
            cd /var/www/app
            docker compose pull
            docker compose up -d
