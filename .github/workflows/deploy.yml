name: Deploy Next.js

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - uses: actions/checkout@v4

      # 2. Логинимся в GHCR через PAT
      - name: Login to GHCR
        run: echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u vlad-vishnevskii --password-stdin

      # 3. Build Docker образ
      - name: Build Docker image
        run: docker build -t ghcr.io/vlad-vishnevskii/tili-mili:latest .

      # 4. Push Docker образ
      - name: Push Docker image
        run: docker push ghcr.io/vlad-vishnevskii/tili-mili:latest

      # 5. Подключаемся к серверу и деплоим
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/app
            if command -v docker-compose &> /dev/null
            then
              docker-compose pull
              docker-compose up -d
            else
              docker compose pull
              docker compose up -d
            fi
